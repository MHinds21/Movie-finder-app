<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Wizard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
 

<body>
<div id="movieSection">
  
    

  <div class="topbar">
  <a href="homepage.html" class="back-arrow">
  <i class="fas fa-chevron-left"></i>
</a>
    <h1>🎬 Movie Wizard</h1>
  <div class="profile-menu">

  <div class="profile-icon" onclick="toggleDropdown()">
    <i class="fas fa-user"></i>
  </div>

  <div id="dropdown" class="dropdown hidden">

    <p id="userStatus">Not logged in</p>

    
    <div id="loginBox">
      <input type="text" id="username" placeholder="Username or Email">
      <input type="password" id="password" placeholder="Password">
      <p id="errorMsg" class="error"></p>
      <button onclick="login()">Login</button>
    </div>

    
    <div id="logoutBox" class="hidden">
      <button onclick="logout()">Logout</button>
    </div>

  </div>

</div>
  </div>
<div class="search-box">
  <form id="searchForm">

    <div class="search-wrapper">
  <i class="fas fa-magnifying-glass search-icon" id="searchIcon"></i>

  <input 
    type="text" 
    id="search" 
    placeholder="Search movies, drama, romance..." 
  />
</div>
  </form>
</div>

 

</div>
  
  <div class="navbar">

  <div class="nav-item active" onclick="selectMenu(this, 'popular')">
    <i class="fas fa-fire"></i>
    <span>Popular</span>
  </div>

  <div class="nav-item" onclick="selectMenu(this, 'top_rated')">
    <i class="fas fa-star"></i>
    <span>Top Rated</span>
  </div>

  <div class="nav-item" onclick="selectMenu(this, 'upcoming')">
    <i class="fas fa-calendar-alt"></i>
    <span>Upcoming</span>
  </div>

  <div class="nav-item" onclick="selectMenu(this, 'watchlist')">
    <i class="fas fa-bookmark"></i>
    <span>Watchlist</span>
  </div>

</div>


 
  <div id="movies" class="movie-grid"></div>

  <!-- MOVIE MODAL -->
  <div id="movieModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <img id="modalPoster">
      <h2 id="modalTitle"></h2>
      <p id="modalRating"></p>
      <p id="modalDate"></p>
      <p id="modalOverview"></p>
    </div>
  </div>
  </div>


  
    <footer class="footer">
  <div class="footer-overlay"></div>
  <div class="footer-content">
    <h2>🎬 Movie Wizard</h2>
    <p>Find your next favorite movie effortlessly.</p>
    <p class="copy">© 2026 Movie Wizard</p>
  </div>
</footer>

</body>


<script>
const API_KEY = "2e9d62d4c3a0513907a14e37f720fc6a";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG_URL = "https://image.tmdb.org/t/p/w500";


function selectMenu(el, type) {
  document.querySelectorAll('.nav-item')
    .forEach(item => item.classList.remove('active'));

  el.classList.add('active');

  if (type === 'watchlist') {
    showWatchlist();
  } else {
    getCategory(type);
  }
}


function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorMsg = document.getElementById("errorMsg");

  errorMsg.textContent = "";

  if (!username || !password) {
    errorMsg.textContent = "Enter all fields";
    return;
  }

  
  if ((username === "test" || username === "test@example.com") && password === "1234") {
    localStorage.setItem("user", username);
    updateAuthUI();
    alert("Login successful");
  } else {
    errorMsg.textContent = "Invalid username or password";
  }
}

function logout() {
  localStorage.removeItem("user");
  updateAuthUI();
  alert("Logged out");
}

function updateAuthUI() {
  const user = localStorage.getItem("user");

  const loginBox = document.getElementById("loginBox");
  const logoutBox = document.getElementById("logoutBox");
  const userStatus = document.getElementById("userStatus");

  if (user) {
    loginBox.style.display = "none";
    logoutBox.style.display = "block";
    userStatus.textContent = "Logged in as " + user;
  } else {
    loginBox.style.display = "block";
    logoutBox.style.display = "none";
    userStatus.textContent = "Not logged in";
  }
}

function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("hidden");
  updateAuthUI();
}

document.addEventListener("DOMContentLoaded", () => {
  updateAuthUI();
});

function addToWatchlist(movie) {
  let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

  if (!watchlist.some(m => m.id === movie.id)) {
    watchlist.push(movie);
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
  }

  alert("Added to watchlist!");
}

function showWatchlist() {
  let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];
  displayMovies(watchlist);
}

let searchInput;

document.addEventListener("DOMContentLoaded", () => {
  updateAuthUI();

  const form = document.getElementById("searchForm");
  searchInput = document.getElementById("search");
  const searchIcon = document.getElementById("searchIcon");

  
  form.addEventListener("submit", function(e) {
    e.preventDefault();
    searchMovies();
  });


  searchIcon.addEventListener("click", function() {
    searchMovies();
  });
});

async function searchMovies() {
  const query = searchInput.value.trim();

  if (!query) {
    alert("Type something to search");
    return;
  }

  try {
    const url = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;

    const res = await fetch(url);
    const data = await res.json();

    displayMovies(data.results);
  } catch (err) {
    console.error("Search failed:", err);
  }
}


async function getCategory(type) {
  const res = await fetch(`${BASE_URL}/movie/${type}?api_key=${API_KEY}`);
  const data = await res.json();
  displayMovies(data.results);
}


function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  if (!movies || movies.length === 0) {
    container.innerHTML = "<p>No movies found.</p>";
    return;
  }

  movies.forEach(movie => {
    const poster = movie.poster_path
      ? IMG_URL + movie.poster_path
      : "https://via.placeholder.com/300x450";

    const div = document.createElement("div");
    div.className = "movie";

   
    div.innerHTML = `
  <img src="${poster}">
  <div class="overlay">
    <h4>${movie.title}</h4>
    <button class="addBtn">+ Watchlist</button>
  </div>
`;

    
    div.querySelector(".addBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      addToWatchlist(movie);
    });

    div.addEventListener("click", () => showDetails(movie));

    container.appendChild(div);
  });
}


function showDetails(movie) {
  document.getElementById("movieModal").classList.remove("hidden");

  document.getElementById("modalPoster").src =
    movie.poster_path
      ? IMG_URL + movie.poster_path
      : "https://via.placeholder.com/300x450";

  document.getElementById("modalTitle").textContent = movie.title;
  document.getElementById("modalRating").textContent = "⭐ Rating: " + movie.vote_average;
  document.getElementById("modalDate").textContent = "📅 Release: " + (movie.release_date || "N/A");
  document.getElementById("modalOverview").textContent =
    movie.overview || "No description available.";
}

function closeModal() {
  document.getElementById("movieModal").classList.add("hidden");
}

  window.onload = () => {
  getCategory('popular');
};

</script>

</body>
</html>
