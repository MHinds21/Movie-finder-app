<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Wizard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body id="loginPage">

<!-- LOGIN PAGE -->
<div id="loginSection" class="container">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username or Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="errorMsg" class="error"></p>
</div>

<!-- MOVIE PAGE -->
<div id="movieSection" class="hidden">

  <div class="topbar">
    <h1>🎬 Movie Wizard</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search movies...">
    <button onclick="searchMovies()">Search</button>
  </div>

  <div class="categories">
    <button onclick="getCategory('popular')">Popular</button>
    <button onclick="getCategory('top_rated')">Top Rated</button>
    <button onclick="getCategory('upcoming')">Upcoming</button>
  </div>

  <div id="movies" class="movie-grid"></div>

  <!-- MOVIE MODAL -->
  <div id="movieModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <img id="modalPoster">
      <h2 id="modalTitle"></h2>
      <p id="modalRating"></p>
      <p id="modalDate"></p>
      <p id="modalOverview"></p>
    </div>
  </div>

</div>

<script>
const API_KEY = "2e9d62d4c3a0513907a14e37f720fc6a";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG_URL = "https://image.tmdb.org/t/p/w500";

// LOGIN
function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.textContent = "";

  if (!username || !password) {
    errorMsg.textContent = "Please enter both username and password.";
    return;
  }

  if ((username === "test@example.com" || username === "test") && password === "1234") {
    document.body.id = "moviePage";
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('movieSection').classList.remove('hidden');
    getCategory('popular');
  } else {
    errorMsg.textContent = "Invalid username or password.";
  }
}

// LOGOUT
function logout() {
  location.reload();
}

// SEARCH
async function searchMovies() {
  const query = document.getElementById("search").value.trim();
  if (!query) return;

  const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}`);
  const data = await res.json();
  displayMovies(data.results);
}

// CATEGORY
async function getCategory(type) {
  const res = await fetch(`${BASE_URL}/movie/${type}?api_key=${API_KEY}`);
  const data = await res.json();
  displayMovies(data.results);
}

// DISPLAY MOVIES
function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  movies.forEach(movie => {
    const poster = movie.poster_path
      ? IMG_URL + movie.poster_path
      : "https://via.placeholder.com/300x450?text=No+Image";

    const div = document.createElement("div");
    div.classList.add("movie");

    div.innerHTML = `
      <img src="${poster}">
      <div class="movie-info">
        <h4>${movie.title}</h4>
        <p>⭐ ${movie.vote_average}</p>
        <p>${movie.release_date || "N/A"}</p>
      </div>
    `;

    div.onclick = () => showDetails(movie);
    container.appendChild(div);
  });
}

// ✅ FIXED (moved outside)
function showDetails(movie) {
  document.getElementById("movieModal").classList.remove("hidden");

  document.getElementById("modalPoster").src =
    movie.poster_path
      ? IMG_URL + movie.poster_path
      : "https://via.placeholder.com/300x450?text=No+Image";

  document.getElementById("modalTitle").textContent = movie.title;
  document.getElementById("modalRating").textContent = "⭐ Rating: " + movie.vote_average;
  document.getElementById("modalDate").textContent = "📅 Release: " + (movie.release_date || "N/A");
  document.getElementById("modalOverview").textContent =
    movie.overview || "No description available.";
}

function closeModal() {
  document.getElementById("movieModal").classList.add("hidden");
}
</script>

</body>
</html>
