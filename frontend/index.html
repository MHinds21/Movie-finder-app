<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Wizard</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div id="movieSection">

    <!-- TOP BAR -->
    <div class="topbar">
      <a href="homepage.html" class="back-arrow">
        <i class="fas fa-chevron-left"></i>
      </a>

      <img src="https://static.vecteezy.com/system/resources/previews/042/848/157/original/collection-of-wizard-head-logo-designs-isolated-png.png" class="logo">

      <div class="profile-menu">
        <div class="profile-icon" onclick="toggleDropdown()">
          <i class="fas fa-user"></i>
        </div>

        <div id="dropdown" class="dropdown hidden">
          <p id="userStatus">Not logged in</p>

          <div id="loginBox">
            <input type="text" id="username" placeholder="Username or Email">
            <input type="password" id="password" placeholder="Password">
            <p id="errorMsg" class="error"></p>
            <button onclick="login()">Login</button>
          </div>

          <div id="logoutBox" class="hidden">
            <button onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <form id="searchForm">
        <div class="search-wrapper">
          <i class="fas fa-magnifying-glass search-icon" id="searchIcon"></i>
          <input type="text" id="search" placeholder="Search movies, drama, romance...">
        </div>
      </form>
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="nav-item active" onclick="selectMenu(this, 'popular')">
        <i class="fas fa-fire"></i>
        <span>Popular</span>
      </div>

      <div class="nav-item" onclick="selectMenu(this, 'top_rated')">
        <i class="fas fa-star"></i>
        <span>Top Rated</span>
      </div>

      <div class="nav-item" onclick="selectMenu(this, 'upcoming')">
        <i class="fas fa-calendar-alt"></i>
        <span>Upcoming</span>
      </div>

      <div class="nav-item" onclick="selectMenu(this, 'watchlist')">
        <i class="fas fa-bookmark"></i>
        <span>Watchlist</span>
      </div>
    </div>

    <!-- MOVIES -->
    <div id="movies" class="movie-grid"></div>

    <!-- MODAL -->
    <div id="movieModal" class="modal hidden">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalPoster">
        <h2 id="modalTitle"></h2>
        <p id="modalRating"></p>
        <p id="modalDate"></p>
        <p id="modalOverview"></p>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-overlay"></div>
      <div class="footer-content">
        <h2>
          <i class="fa-solid fa-hat-wizard"></i>
          Movie Wizard
        </h2>
        <p>© 2026 Movie Wizard. All rights reserved.</p>
      </div>
    </footer>

  </div>

  <script src="main.js"></script>

</body>
</html>
