<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Wizard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="movieSection">

  <div class="topbar">
    <div class="profile-icon" onclick="toggleDropdown()">
      <i class="fas fa-user"></i>
    </div>

    <div id="dropdown" class="dropdown hidden">
      <p id="userStatus">Not logged in</p>

      <div id="loginBox">
        <input id="username" type="text">
        <input id="password" type="password">
        <p id="errorMsg"></p>
        <button onclick="login()">Login</button>
      </div>

      <div id="logoutBox" class="hidden">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="search-box">
    <form id="searchForm">
      <div class="search-wrapper">
        <i class="fas fa-search" id="searchIcon"></i>
        <input id="search" type="text">
      </div>
    </form>
  </div>

  <div class="navbar">
    <div class="nav-item active" onclick="selectMenu(this,'popular')">
      <i class="fas fa-fire"></i><span>Popular</span>
    </div>

    <div class="nav-item" onclick="selectMenu(this,'top_rated')">
      <i class="fas fa-star"></i><span>Top Rated</span>
    </div>

    <div class="nav-item" onclick="selectMenu(this,'upcoming')">
      <i class="fas fa-calendar"></i><span>Upcoming</span>
    </div>

    <div class="nav-item" onclick="selectMenu(this,'watchlist')">
      <i class="fas fa-bookmark"></i><span>Watchlist</span>
    </div>
  </div>

  <div id="movies" class="movie-grid"></div>

  <div id="movieModal" class="modal hidden">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <img id="modalPoster">

      <h2 id="modalTitle"></h2>
      <p id="modalRating"></p>
      <p id="modalDate"></p>
      <p id="modalOverview"></p>

      <button id="watchlistBtn" onclick="toggleWatchlist()">
        <i class="fas fa-plus"></i>
      </button>

    </div>
  </div>

</div>

<script src="main.js"></script>

</body>
</html>
